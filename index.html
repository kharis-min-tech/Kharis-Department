  <style>
    * { box-sizing: border-box; transition: all .25s ease; }
    html, body { height: 100%; margin: 0; }
    
    body {
      font-family: 'Quicksand', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      --bg-img: url('https://kharis.org/wp-content/uploads/2022/11/271239127_4868436629869265_1030465267411614205_n.jpg');
      --card-bg: rgba(60,19,97,0.85);
      --btn-bg: #ffd700;
      --btn-color: #3c1361;
      --text-color: #fff;
      background: var(--bg-img) center/cover no-repeat fixed;
      color: var(--text-color);
    }
    
    body.light {
      --card-bg: rgba(255,255,255,0.95);
      --btn-bg: #3c1361;
      --btn-color: #ffd700;
      --text-color: #111;
      background: linear-gradient(180deg,#fff,#f4f4f4);
    }
    
    /* Video container styles - FIXED for non-stretchy videos */
    .video-container {
      text-align: center;
      margin: 15px 0;
      width: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .video-container iframe {
      width: 100%;
      height: auto;
      min-height: 180px;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      aspect-ratio: 16/9;
    }

    /* Thumbnail style for videos */
    .video-thumbnail {
      position: relative;
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16/9;
    }

    .video-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .video-thumbnail:hover img {
      transform: scale(1.05);
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: rgba(255, 215, 0, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3c1361;
      font-size: 24px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 820px;
      background: var(--card-bg);
      border-radius: 18px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      color: var(--text-color);
      position: relative;
      max-height: 90vh;
      overflow-y: auto; /* ADDED: Makes the card scrollable */
      scrollbar-width: thin;
      scrollbar-color: var(--btn-bg) rgba(255,255,255,0.1);
    }
    
    /* Custom scrollbar for the card */
    .card::-webkit-scrollbar {
      width: 8px;
    }
    
    .card::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    
    .card::-webkit-scrollbar-thumb {
      background: var(--btn-bg);
      border-radius: 10px;
    }
    
    h1 { font-family: 'Fredoka One', cursive; margin-bottom: 0.6rem; }
    p.lead { margin-bottom: 1rem; opacity: 0.9; }
    
    .btn {
      display: inline-block;
      width: 100%;
      max-width: 360px;
      margin: 0.6rem auto;
      padding: 12px 18px;
      border-radius: 50px;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-color);
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      font-size: 1rem;
    }
    
    .btn:hover { filter: brightness(.92); transform: scale(1.02); }
    
    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.9);
      color: #3c1361;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
    }
    
    /* Bubbly Dropdown Styles */
    .language-dropdown-container {
      position: relative;
      display: inline-block;
      margin: 0 auto 20px auto;
      text-align: center;
      z-index: 1000;
    }
    
body.light .language-select {
  color: #3c1361;
  background: rgba(255, 255, 255, 0.8);
}

body.light .language-select option {
  background: rgba(255, 255, 255, 0.95);
  color: #3c1361;
}

body.light .language-dropdown-container::after {
  color: #3c1361;
}


    .language-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 215, 0, 0.7);
      border-radius: 25px;
      padding: 12px 45px 12px 20px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      width: 200px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      outline: none;
    }
    
    .language-select:hover {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }
    
    .language-select:focus {
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.5);
    }
    
    .language-dropdown-container::after {
      content: "‚ñº";
      font-size: 12px;
      color: #ffd700;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    
    .language-select option {
      background: rgba(60, 19, 97, 0.95);
      color: #fff;
      padding: 10px;
      border-radius: 15px;
      margin: 5px;
      font-weight: bold;
    }
    
    .language-select::-webkit-scrollbar {
      width: 8px;
    }
    
    .language-select::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    
    .language-select::-webkit-scrollbar-thumb {
      background: rgba(255, 215, 0, 0.7);
      border-radius: 10px;
    }
    
    .language-select::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 215, 0, 0.9);
    }
    
    /* Quiz specific styles */
    #quiz, #result { 
      opacity: 0; 
      transition: opacity 0.5s ease; 
      display: none;
    }
    #quiz.show, #result.show { 
      opacity: 1; 
      display: block;
    }
    
    .question-counter {
      text-align: center;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    
    .question { font-family: 'Fredoka One', cursive; font-size: 1.15rem; margin: 10px 0; }
    .scripture { font-style: italic; opacity: 0.85; margin-bottom: 8px; }
    
    .progress-bar { width: 100%; height: 12px; background: #ddd; border-radius: 999px; overflow: hidden; margin: 14px 0; }
    .progress { height: 100%; width: 0%; background: var(--btn-bg); transition: width .35s ease; }
    
    .result { margin-top: 12px; }
    .department { margin: 10px 0; font-family: 'Fredoka One', cursive; font-size: 1.08rem; opacity: 0; transform: translateY(10px); transition: all .6s ease; }
    .department.show { opacity: 1; transform: none; }
    
    .scripture-box {
      margin-top: 8px;
      padding: 12px;
      border-left: 5px solid var(--btn-bg);
      background: rgba(255,215,0,0.08);
      border-radius: 8px;
      text-align: left;
      font-style: italic;
      display: none;
      max-height: 400px; /* ADDED: Prevents content from being cut off */
      overflow-y: auto; /* ADDED: Makes scripture box scrollable if needed */
    }
    
    .scripture-box.visible { display: block; }
    
    .toggle-mode {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 2px solid var(--btn-bg);
      color: var(--btn-bg);
      padding: 6px 10px;
      border-radius: 18px;
      cursor: pointer;
      z-index: 10; /* Ensures button stays on top */
    }
    
.voice-btn {
    background: transparent;
    border: none;
    color: var(--btn-bg);
    font-size: 1.2rem;
    cursor: pointer;
    margin-left: 8px;
    vertical-align: middle;
}

.voice-btn:hover {
    transform: scale(1.1);
}

.question-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
}


    .back-btn {
      background: transparent;
      color: var(--btn-bg);
      border: 2px solid var(--btn-bg);
      padding: 8px 14px;
      border-radius: 28px;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      display: inline-block;
    }
    
    /* Explore list styles - IMPROVED */
    .explore-list { 
      margin-top: 12px; 
      display: flex; 
      flex-direction: column; 
      gap: 8px;
      max-height: 500px; /* ADDED: Prevents list from getting too long */
      overflow-y: auto; /* ADDED: Makes explore list scrollable */
      padding-right: 5px;
    }
    
    .explore-item {
      background: rgba(255,255,255,0.06);
      padding: 12px 14px;
      border-radius: 8px;
      display: flex;
      flex-direction: column; /* CHANGED: Stack items vertically */
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    
    .explore-item:hover {
      background: rgba(255,215,0,0.15);
    }
    
    .explore-item .title { 
      flex: 1; 
      text-align: left; 
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .explore-item .title .expand-icon {
      font-size: 1.2rem;
      color: var(--btn-bg);
      transition: transform 0.3s ease;
    }
    
    .explore-item.expanded .title .expand-icon {
      transform: rotate(45deg);
    }
    
    .explore-details { 
      display: none; 
      padding: 15px 12px; 
      margin-top: 12px; 
      background: rgba(0,0,0,0.2); 
      border-radius: 8px; 
      text-align: left; 
      font-style: normal; 
      color: var(--text-color);
      max-height: 400px; /* ADDED: Prevents content cut-off */
      overflow-y: auto; /* ADDED: Makes details scrollable if needed */
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .explore-details.visible { 
      display: block; 
    }
    
    /* FIXED: Video in explore details */
    .explore-details .video-container {
      margin-top: 12px;
    }
    
    .explore-details iframe {
      width: 100%;
      height: auto;
      min-height: 160px;
      max-height: 200px;
      border-radius: 6px;
      aspect-ratio: 16/9;
    }
    .explore-details p:contains("undefined") {
  display: none;
}
    /* Background slideshow */
    .bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    .bg-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      background-size: cover;
      background-position: center;
    }
    
    .bg-slide.active {
      opacity: 1;
    }
    
    /* FIXED: Back button positioning */
    #back-to-result {
      margin-top: 15px;
      position: sticky;
      bottom: 0;
      background: var(--card-bg);
      z-index: 5;
    }
    
    /* Scripture text formatting */
    .scripture-box p {
      margin: 8px 0;
      line-height: 1.5;
    }
    
    .scripture-box strong {
      color: var(--btn-bg);
    }
  </style>

    // Initialize background slideshow
    function initSlideshow() {
      const slideshow = document.getElementById('bgSlideshow');
      
      // Create slide elements
      bgImages.forEach((img, index) => {
        const slide = document.createElement('div');
        slide.className = 'bg-slide';
        slide.style.backgroundImage = `url('${img}')`;
        if (index === 0) slide.classList.add('active');
        slideshow.appendChild(slide);
      });
      
      // Start slideshow
      let currentSlide = 0;
      const slides = document.querySelectorAll('.bg-slide');
      
      setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }, 5000);
    }

    // Helper function to get negation words for current language
    function getNegationWords(langCode) {
      return negationWords[langCode] || negationWords.en;
    }

    // Helper function to get keywords for current language and department
    function getKeywordsForDepartment(dept, langCode) {
      // Try to get language-specific keywords
      const langKeywords = departmentKeywords[langCode];
      if (langKeywords && langKeywords[dept]) {
        return langKeywords[dept];
      }
      // Fall back to English
      return departmentKeywords.en[dept] || [];
    }

    // Universal negation detection function
    function hasNegation(text, department, langCode) {
      const words = text.toLowerCase().split(' ');
      const langNegations = getNegationWords(langCode);
      const keywords = getKeywordsForDepartment(department, langCode);
      
      // Check each keyword for this department
      for (let keyword of keywords) {
        const keywordIndex = words.findIndex(w => w.includes(keyword));
        
        if (keywordIndex > 0) {
          // Check the word BEFORE the keyword
          const previousWord = words[keywordIndex - 1];
          
          // Check if it's a negation in the current language
          if (langNegations.includes(previousWord)) {
            return true;
          }
          
          // Check 2 words back for phrases like "I really don't like"
          if (keywordIndex > 1) {
            const twoWordsBack = words[keywordIndex - 2];
            if (langNegations.includes(twoWordsBack)) {
              return true;
            }
          }
        }
      }
      
      return false;
    }

        'tw': isIOS ? 'en-GB' : 'en-GH',

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();

    /* --------------- Language functions ------------------ */
    function setLanguage(langCode) {
      currentLanguage = langCode;
      const lang = translations[langCode] || translations.en;
      
      document.getElementById('pageTitle').textContent = lang.title;
      document.getElementById('pageSubtitle').textContent = lang.subtitle;
      document.getElementById('username').placeholder = lang.namePlaceholder;
      document.querySelector('#branch option[disabled]').textContent = lang.branchPlaceholder;
      document.getElementById('start-kharis').textContent = lang.startButton;
      
      const answerInput = document.getElementById('answer');
      if (answerInput) {
        answerInput.placeholder = lang.answerPlaceholder || 'Type your answer here...';
      }
      
      if (backBtn.style.display !== 'none') {
        backBtn.textContent = lang.backButton;
      }
      
      if (quizEl.classList.contains('show')) {
        showQuestion();
      }
      
      if (resultEl.classList.contains('show')) {
        showResult();
      }
      
      document.documentElement.lang = langCode;
    }

    function handleLanguageChange() {
      setLanguage(this.value);
    }

    /* --------------- Quiz functions ------------------ */
    function startQuiz() {
      username = (usernameInput.value || '').trim();
      branch = (branchSelect.value || '').trim();
      document.getElementById('privacy-policy-link').style.display = 'none';
      const lang = translations[currentLanguage] || translations.en;
      
      if(!username){
        alert(lang.namePlaceholder + " üòä");
        return;
      }
      if(!branch){
        alert(lang.branchPlaceholder + " üòä");
        return;
      }

      currentQ = 0;
      questionHistory = [];
      deptScores = {};
      showQuestion();
    }

    function showQuestion() {
      const lang = translations[currentLanguage] || translations.en;
      const qObj = lang.questions[currentQ];

      quizEl.innerHTML = `
        <div class="question-counter">${lang.questionCounter.replace('{current}', currentQ+1).replace('{total}', lang.questions.length)}</div>
        <div class="scripture">${qObj.s}</div>
        <div class="question-container">
            <div class="question">${qObj.q}</div>
            <button class="voice-btn" id="voiceBtn" aria-label="Read question aloud">üîä</button>
        </div>
        <input id="answer" type="text" placeholder="${lang.answerPlaceholder || 'Type your answer here...'}" aria-label="Your answer" />
        <div id="error-msg" style="color:#ffd700;font-weight:600;text-align:center;margin-bottom:10px;"></div>
        <button class="btn" id="nextBtn">${lang.nextButton}</button>
      `;

      quizEl.classList.add('show');
      startScreenEl.style.display = "none";
      resultEl.classList.remove('show');
      backBtn.style.display = currentQ > 0 ? "inline-block" : "none";
      backBtn.textContent = lang.backButton;
      progressBar.style.width = Math.round(((currentQ+1)/lang.questions.length)*100) + "%";

      setTimeout(() => {
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', nextQuestion);
        
        const answerInput = document.getElementById('answer');
        if (answerInput) answerInput.focus();
        
        const voiceBtn = document.getElementById('voiceBtn');
        if (voiceBtn) {
          voiceBtn.addEventListener('click', () => {
            speakText(qObj.q, currentLanguage);
          });
        }
      }, 20);
    }

    function nextQuestion() {
      const inputEl = document.getElementById('answer');
      const value = inputEl ? inputEl.value.trim() : '';
      const lang = translations[currentLanguage] || translations.en;

      if (!value) {
        document.getElementById('error-msg').textContent = lang.errorMsg;
        return;
      }

      questionHistory[currentQ] = {
        q: currentQ,
        deptScores: { ...deptScores },
        answer: value
      };

      // UPDATED: Use new multi-language scoring
      scoreAnswer(value);

      currentQ++;
      const langData = translations[currentLanguage] || translations.en;

      if (currentQ < langData.questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    // UPDATED: New scoreAnswer function with multi-language support
    function scoreAnswer(input) {
      const text = input.toLowerCase();
      const langCode = currentLanguage;
      const lang = translations[langCode] || translations.en;
      
      // Define all possible departments (using English names as keys)
      const allDepartments = [
        "Music", "K-Music", "Children's Department", "Hospitality", "Host Team",
        "Welfare", "Follow Up", "New Believers", "Administration", "Production",
        "Tech Team", "Sound", "Photography", "Design", "Drama", "Spoken Word",
        "Social Media", "Evangelism", "Sanctuary Keepers", "Set-up", "Uniform",
        "Ushers", "Security", "Guest Relations", "Audio", "Media"
      ];
      
      // Check each department
      for (let department of allDepartments) {
        
        // Skip departments that don't exist in current language
        let deptExists = false;
        for (let deptName in lang.departments) {
          // Simple check - in production you'd want a proper mapping
          if (deptName.toLowerCase().includes(department.toLowerCase()) || 
              department.toLowerCase().includes(deptName.toLowerCase())) {
            deptExists = true;
            break;
          }
        }
        if (!deptExists) continue;
        
        // Branch restrictions (using English department names)
        if (department === "K-Music" && !branch.includes('Kharis Phase 2')) continue;
        if (department === "Children's Department" && branch !== 'Kharis Church London') continue;
        
        // Check for negation in the user's language
        if (hasNegation(text, department, langCode)) {
          continue; // Skip if negated
        }
        
        // Get keywords for this department in the current language
        const keywords = getKeywordsForDepartment(department, langCode);
        
        // Check for keywords
        for (let keyword of keywords) {
          if (text.includes(keyword)) {
            deptScores[department] = (deptScores[department] || 0) + 2;
            break;
          }
        }
      }
      
      // REMOVED random scores - departments only get points if mentioned
      // No more: deptScores[dept] = deptScores[dept] || Math.random() * 0.5;
    }

    function collectAnswers() {
      const answers = [];
      const lang = translations[currentLanguage] || translations.en;
      
      for (let i = 0; i < currentQ; i++) {
        answers.push(`${lang.questions[i].q}: ${questionHistory[i]?.answer || ''}`);
      }
      
      return answers;
    }

    function sendToGoogleSheets(data) {
      console.log('Sending to Google Sheets:', data);
      
      const englishData = {
        name: data.name,
        branch: data.branch,
        topDepartments: data.topDepartments.map(dept => convertToEnglish(dept)),
        originalLanguage: data.language,
        timestamp: new Date().toISOString()
      };

      fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(englishData)
      })
      .then(response => {
        console.log('Response status:', response.status);
        if (response.ok || response.type === 'opaque') {
          console.log('Data successfully sent to Google Sheets');
        } else {
          console.error('Failed to send data to Google Sheets');
        }
      })
      .catch(error => {
        console.error('Error sending to Google Sheets:', error);
      });
    }

    function goBack() {
      stopSpeech();

      if (currentQ === 0) return;

      currentQ--;

      const previous = questionHistory[currentQ];

      if (previous) {
        deptScores = { ...previous.deptScores };
        
        showQuestion();

        setTimeout(() => {
          const answerInput = document.getElementById('answer');
          if (answerInput && previous.answer) {
            answerInput.value = previous.answer;
          }
        }, 20);
      }

      backBtn.style.display = currentQ > 0 ? "inline-block" : "none";
    }

      const lang = translations[currentLanguage] || translations.en;

      // Get top departments based on scores
      const sorted = Object.entries(deptScores).sort((a, b) => b[1] - a[1]);
      
      // Filter out low scores (optional - only show if at least 2 points)
      const meaningfulScores = sorted.filter(entry => entry[1] >= 2);
      const topDepts = meaningfulScores.slice(0, 2);
      lastSorted = topDepts;

      // Send results to Google Sheets
      const resultsData = {

    function renderExploreList() {
      const lang = translations[currentLanguage] || translations.en;
      
      let html = `<h2>${lang.allDepartments}</h2><div class="explore-list">`;
      
      Object.entries(lang.departments).forEach(([dept, info], idx) => {
        // Check branch restrictions
        const englishDept = convertToEnglish(dept);
        if (englishDept === "Children's Department" && branch !== 'Kharis Church London') {
          return;
        }
        if (englishDept === "K-Music" && !branch.includes('Kharis Phase 2')) {
          return;
        }
        
        html += `
        <div class="explore-item" data-idx="${idx}">
          <div class="title">
            <span>${dept}</span>
            <span class="expand-icon">+</span>
          </div>
          <div class="explore-details" id="explore-detail-${idx}">
            <p style="margin:0 0 6px 0">${info.desc}</p>
            <p style="margin:0;font-style:italic;font-size:0.95rem">${info.scripture}</p>
          ${info.video ? `
        <div style="margin-top:12px;">
          <iframe width="100%" height="150" src="${info.video}" 
                  frameborder="0" allowfullscreen style="border-radius:6px;">
          </iframe>
        </div>
      ` : ''}
          </div>
        </div>
      `;
      });
      
      html += `</div><div style="margin-top:14px;"><button class="btn" id="back-to-result">${lang.backToResults}</button></div>`;

      resultEl.innerHTML = html;

      // Attach toggle listeners with improved toggle functionality
      const items = resultEl.querySelectorAll('.explore-item');
      items.forEach((item) => {
        const idx = item.getAttribute('data-idx');
        const details = resultEl.querySelector(`#explore-detail-${idx}`);
        const expandIcon = item.querySelector('.expand-icon');
        
        if (details) {
          details.style.display = 'none';
          
          item.addEventListener('click', (e) => {
            // Toggle current item
            const isVisible = details.style.display === 'block';
            
            // Close all other items
            items.forEach(otherItem => {
              const otherIdx = otherItem.getAttribute('data-idx');
              const otherDetails = resultEl.querySelector(`#explore-detail-${otherIdx}`);
              const otherIcon = otherItem.querySelector('.expand-icon');
              if (otherDetails && otherIdx !== idx) {
                otherDetails.style.display = 'none';
                otherItem.classList.remove('expanded');
                if (otherIcon) otherIcon.textContent = '+';
              }
            });
            
            // Toggle current
            details.style.display = isVisible ? 'none' : 'block';
            item.classList.toggle('expanded', !isVisible);
            expandIcon.textContent = isVisible ? '+' : '√ó';
            
            // Scroll to keep item in view if expanded
            if (!isVisible) {
              setTimeout(() => {
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }, 100);
            }
          });
        }
      });

      // Back button handler - FIXED to properly restore state
      const backBtn = document.getElementById('back-to-result');
      if (backBtn) {
        backBtn.addEventListener('click', () => {
          resultEl.innerHTML = lastResultHtml;
          
          // Re-attach event listeners
          const exploreBtn = document.getElementById('explore-all-btn');
          const restartBtn = document.getElementById('restart-btn');
          
          if (exploreBtn) {
            exploreBtn.addEventListener('click', renderExploreList);
          }
          
          if (restartBtn) {
            restartBtn.addEventListener('click', restartWithoutReload);
          }
          
          // Re-animate departments
          setTimeout(() => {
            lastSorted.forEach((_, i) => {
              const el = document.getElementById(`dept-${i}`);
              const sb = document.getElementById(`scripture-${i}`);
              if (el) {
                el.classList.add('show');
                sb.classList.add('visible');
              }
            });
          }, 100);
        });
      }
    }

      for (const proxy of corsProxies) {

          if (voices.length) {
            resolve(voices);
